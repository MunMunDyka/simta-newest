<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Gambar 4.1 - Alur Sistem yang Sedang Berjalan</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Times New Roman',serif; background:#fff; display:flex; flex-direction:column; align-items:center; padding:40px 20px; }
.caption { text-align:center; margin-top:16px; font-size:12pt; }
</style>
</head>
<body>
<svg width="900" height="1180" xmlns="http://www.w3.org/2000/svg" font-family="Times New Roman, serif" font-size="12">
<defs>
<marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#000"/></marker>
</defs>

<!-- HEADER -->
<rect x="0" y="0" width="900" height="42" fill="#f2f2f2" stroke="#000" stroke-width="1.5"/>
<line x1="300" y1="0" x2="300" y2="42" stroke="#000" stroke-width="1.5"/>
<line x1="600" y1="0" x2="600" y2="42" stroke="#000" stroke-width="1.5"/>
<text x="150" y="27" text-anchor="middle" font-size="13" font-weight="bold">Mahasiswa</text>
<text x="450" y="27" text-anchor="middle" font-size="13" font-weight="bold">Dosen Pembimbing</text>
<text x="750" y="27" text-anchor="middle" font-size="13" font-weight="bold">Koordinator TA</text>

<!-- LANE DIVIDERS -->
<line x1="300" y1="42" x2="300" y2="1180" stroke="#000" stroke-width="1" stroke-dasharray="8,4"/>
<line x1="600" y1="42" x2="600" y2="1180" stroke="#000" stroke-width="1" stroke-dasharray="8,4"/>
<rect x="0" y="42" width="900" height="1138" fill="none" stroke="#000" stroke-width="1.5"/>

<!-- 1. START -->
<circle cx="150" cy="75" r="12" fill="#000"/>
<line x1="150" y1="87" x2="150" y2="110" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 2. Menyiapkan Dokumen -->
<rect x="40" y="115" width="220" height="40" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="150" y="139" text-anchor="middle">Menyiapkan Dokumen Skripsi</text>
<line x1="150" y1="155" x2="150" y2="185" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 3. Mengirim / Mencetak -->
<rect x="25" y="190" width="250" height="48" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="150" y="210" text-anchor="middle">Mengirim Dokumen via WA/Email</text>
<text x="150" y="228" text-anchor="middle">atau Mencetak Hardcopy</text>

<!-- Arrow cross to Dosen -->
<line x1="275" y1="214" x2="450" y2="214" stroke="#000" stroke-width="1.5"/>
<line x1="450" y1="214" x2="450" y2="260" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 4. Menerima dan Membaca -->
<rect x="340" y="265" width="220" height="40" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="450" y="289" text-anchor="middle">Menerima dan Membaca Dokumen</text>
<line x1="450" y1="305" x2="450" y2="340" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 5. DECISION: Dokumen Sesuai? -->
<polygon points="450,345 515,390 450,435 385,390" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="450" y="386" text-anchor="middle" font-size="11" font-weight="bold">Dokumen</text>
<text x="450" y="399" text-anchor="middle" font-size="11" font-weight="bold">Sesuai?</text>

<!-- TIDAK: bottom exit -->
<text x="462" y="450" font-size="11" font-style="italic">Tidak</text>
<line x1="450" y1="435" x2="450" y2="470" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 6. Catatan Revisi -->
<rect x="340" y="475" width="220" height="45" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="450" y="494" text-anchor="middle">Memberikan Catatan Revisi</text>
<text x="450" y="510" text-anchor="middle">(Lisan / WhatsApp)</text>

<!-- Arrow left to Mahasiswa -->
<line x1="340" y1="497" x2="150" y2="497" stroke="#000" stroke-width="1.5"/>
<line x1="150" y1="497" x2="150" y2="540" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 7. Perbaikan Dokumen -->
<rect x="40" y="545" width="220" height="40" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="150" y="569" text-anchor="middle">Melakukan Perbaikan Dokumen</text>

<!-- Loop back to Mengirim -->
<line x1="40" y1="565" x2="14" y2="565" stroke="#000" stroke-width="1.5"/>
<line x1="14" y1="565" x2="14" y2="214" stroke="#000" stroke-width="1.5"/>
<line x1="14" y1="214" x2="25" y2="214" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- YA: right exit -->
<text x="520" y="385" font-size="11" font-style="italic">Ya</text>
<line x1="515" y1="390" x2="570" y2="390" stroke="#000" stroke-width="1.5"/>
<line x1="570" y1="390" x2="570" y2="620" stroke="#000" stroke-width="1.5"/>
<line x1="570" y1="620" x2="450" y2="620" stroke="#000" stroke-width="1.5"/>
<line x1="450" y1="620" x2="450" y2="645" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 8. ACC dan Tanda Tangan -->
<rect x="340" y="650" width="220" height="45" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="450" y="669" text-anchor="middle">Memberikan ACC dan</text>
<text x="450" y="685" text-anchor="middle">Menandatangani Logbook</text>

<!-- Arrow left to Mahasiswa -->
<line x1="340" y1="672" x2="150" y2="672" stroke="#000" stroke-width="1.5"/>
<line x1="150" y1="672" x2="150" y2="715" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 9. Mencetak dan Mengumpulkan -->
<rect x="25" y="720" width="250" height="50" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="150" y="739" text-anchor="middle">Mencetak Lembar Persetujuan</text>
<text x="150" y="757" text-anchor="middle">dan Mengumpulkan Berkas</text>

<!-- Arrow right to Koordinator -->
<line x1="275" y1="745" x2="750" y2="745" stroke="#000" stroke-width="1.5"/>
<line x1="750" y1="745" x2="750" y2="785" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 10. Memeriksa Kelengkapan -->
<rect x="640" y="790" width="220" height="40" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="750" y="814" text-anchor="middle">Memeriksa Kelengkapan Berkas</text>
<line x1="750" y1="830" x2="750" y2="860" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 11. DECISION: Berkas Lengkap? -->
<polygon points="750,865 815,910 750,955 685,910" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="750" y="906" text-anchor="middle" font-size="11" font-weight="bold">Berkas</text>
<text x="750" y="919" text-anchor="middle" font-size="11" font-weight="bold">Lengkap?</text>

<!-- TIDAK: left exit -->
<text x="672" y="906" text-anchor="end" font-size="11" font-style="italic">Tidak</text>
<line x1="685" y1="910" x2="150" y2="910" stroke="#000" stroke-width="1.5"/>
<line x1="150" y1="910" x2="150" y2="940" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 12. Melengkapi Berkas -->
<rect x="40" y="945" width="220" height="35" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="150" y="967" text-anchor="middle">Melengkapi Berkas</text>
<line x1="40" y1="962" x2="14" y2="962" stroke="#000" stroke-width="1.5"/>
<line x1="14" y1="962" x2="14" y2="745" stroke="#000" stroke-width="1.5"/>
<line x1="14" y1="745" x2="25" y2="745" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- YA: bottom exit -->
<text x="758" y="970" font-size="11" font-style="italic">Ya</text>
<line x1="750" y1="955" x2="750" y2="990" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 13. Menyusun Jadwal -->
<rect x="640" y="995" width="220" height="40" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="750" y="1019" text-anchor="middle">Menyusun Jadwal Sidang Manual</text>
<line x1="750" y1="1035" x2="750" y2="1060" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- 14. Menginformasikan -->
<rect x="640" y="1065" width="220" height="40" rx="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="750" y="1089" text-anchor="middle">Menginformasikan Jadwal via WA</text>
<line x1="750" y1="1105" x2="750" y2="1130" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

<!-- END -->
<circle cx="750" cy="1148" r="14" fill="#fff" stroke="#000" stroke-width="3"/>
<circle cx="750" cy="1148" r="8" fill="#000"/>

</svg>
<p class="caption"><strong>Gambar 4.1</strong> Aliran Sistem yang Sedang Berjalan</p>
</body>
</html>
